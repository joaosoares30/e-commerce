<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-Ecommerce</title>
</head>

<body class="login-page">
    <header class="header-login">
        <div class="login-container">
            <a href="index.html" class="back-to-home">
                <i class="fa-solid fa-arrow-left"></i> Voltar para a loja
            </a>
            <h2>Crie sua conta e compre com frete grátis</h2>
            <form>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="actions">
                    <label>
                        <input type="checkbox"> Lembrar-me
                    </label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Acessar Conta</button>
            </form>

            <div class="register-link">
                Não tem uma conta? <a href="#">Cadastre-se</a>
            </div>
        </div>
    </header>
    <footer class="footer-login">
        <p>Desenvolvido por João Soares</p>
        <div class="social-links">
            <a href="https://github.com/joaosoares30" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/SEU-USUARIO-LINKEDIN" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            <a href="mailto:seuemail@gmail.com" aria-label="E-mail">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </footer>
</body>

</html>
