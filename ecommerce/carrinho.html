<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - E-Commerce</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="index.html"><img alt="logo-ecommerce" class="logo" src="img/logo-ecommerce.png"></a>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar produtos..." class="search-input">
                <button class="search-btn" id="searchBtn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <nav class="link-nav">
                <a class="link-carrinho" href="carrinho.html"><i class="fa-solid fa-cart-shopping"></i> Carrinho</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container-body">
            <h2 class="section-title">Meu Carrinho</h2>

            <div class="cart-list" id="cart-list">
                <!-- Itens do carrinho renderizados via JS -->
            </div>

            <div class="cart-summary" id="cart-summary">
                <div class="cart-total">
                    Total: <span id="cart-total-value">R$ 0,00</span>
                </div>
                <button class="btn-checkout" id="checkoutBtn">Finalizar Compra</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por João Soares</p>
        <div class="social-links">
            <a href="https://github.com/joaosoares30" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/SEU-USUARIO-LINKEDIN" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin"></i>
            </a>
            <a href="mailto:seuemail@gmail.com" aria-label="E-mail">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </footer>

    <script src="products.js"></script>
    <script src="script.js"></script>
</body>

</html>
